<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホーム | Re Relation</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background: #fdf5f5;
      color: #333;
      min-height: 100vh;
      padding-bottom: 20px;
    }

    /* Header */
    .header {
      background: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #f5e5e5;
    }
    .header-logo { font-size: 24px; font-weight: 700; color: #e95f5f; letter-spacing: 3px; }
    .header-right { display: flex; gap: 8px; align-items: center; }
    .logout-btn {
      background: none; border: 1.5px solid #eee; color: #ccc;
      padding: 7px 14px; border-radius: 20px; font-size: 12px; font-family: inherit; cursor: pointer;
    }
    .admin-btn {
      background: #e95f5f; border: none; color: #fff;
      padding: 7px 14px; border-radius: 20px; font-size: 12px; font-family: inherit; cursor: pointer; font-weight: 700;
    }

    .content { padding: 20px; max-width: 500px; margin: 0 auto; }

    /* Welcome card */
    .welcome-card {
      background: linear-gradient(135deg, #e95f5f 0%, #c94444 100%);
      border-radius: 22px;
      padding: 22px 20px 18px;
      color: #fff;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }
    .welcome-card::before {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%;
    }
    .welcome-card::after {
      content: ''; position: absolute; bottom: -40px; right: 20px;
      width: 90px; height: 90px; background: rgba(255,255,255,0.07); border-radius: 50%;
    }
    .welcome-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .welcome-date { font-size: 12px; opacity: .75; }
    .days-badge {
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.35);
      font-size: 11px; font-weight: 700;
      padding: 4px 11px; border-radius: 20px;
      flex-shrink: 0;
    }
    .welcome-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
    .welcome-msg { font-size: 13px; opacity: .9; line-height: 1.8; margin-bottom: 12px; }
    .goal-badge {
      display: inline-flex; align-items: center;
      background: rgba(255,255,255,0.22); border: 1px solid rgba(255,255,255,0.35);
      font-size: 11px; font-weight: 700; padding: 5px 13px; border-radius: 20px;
    }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card {
      background: #fff; border-radius: 16px; padding: 14px 8px; text-align: center;
      box-shadow: 0 3px 14px rgba(233,95,95,0.07);
    }
    .stat-value { font-size: 26px; font-weight: 700; color: #e95f5f; line-height: 1; }
    .stat-unit { font-size: 11px; color: #e95f5f; opacity: .7; }
    .stat-label { font-size: 10px; color: #bbb; margin-top: 4px; line-height: 1.4; }

    /* Today action */
    .today-action {
      background: linear-gradient(135deg, #fff8e1, #fff3cd);
      border: 2px solid #f59f00;
      border-radius: 18px;
      padding: 16px 18px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: all .2s;
    }
    .today-action:hover { box-shadow: 0 4px 16px rgba(245,159,0,0.2); }
    .today-action-icon { font-size: 32px; flex-shrink: 0; }
    .today-action-inner { flex: 1; min-width: 0; }
    .today-action-label { font-size: 10px; font-weight: 700; color: #f59f00; letter-spacing: .5px; margin-bottom: 3px; }
    .today-action-text { font-size: 14px; font-weight: 700; color: #333; line-height: 1.4; }
    .today-action-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
    .today-action-done {
      background: linear-gradient(135deg, #f0fff4, #e8f5e9);
      border-color: #66bb6a;
    }
    .today-action-done .today-action-label { color: #66bb6a; }

    /* CTA 2x2 grid */
    .cta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .cta-card {
      background: #fff; border-radius: 18px; padding: 16px 14px;
      cursor: pointer; transition: all .2s;
      box-shadow: 0 3px 14px rgba(233,95,95,0.07);
      border: 2px solid transparent; text-decoration: none; color: inherit; display: block;
    }
    .cta-card:hover { border-color: #f5c0c0; box-shadow: 0 5px 18px rgba(233,95,95,0.12); }
    .cta-card.done { background: #f5fff8; border-color: #b8e6c0; }
    .cta-icon { font-size: 28px; margin-bottom: 7px; }
    .cta-title { font-size: 13px; font-weight: 700; color: #333; margin-bottom: 3px; }
    .cta-sub { font-size: 11px; color: #bbb; line-height: 1.4; }
    .done-pill {
      display: inline-block; background: #e8f5ee; color: #5cb87a;
      font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 10px; margin-top: 4px;
    }

    /* Section card */
    .section {
      background: #fff; border-radius: 20px; padding: 20px;
      margin-bottom: 14px; box-shadow: 0 3px 14px rgba(233,95,95,0.07);
    }
    .section-title { font-size: 13px; font-weight: 700; color: #bbb; margin-bottom: 16px; letter-spacing: .5px; }
    .section-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .section-title-row .section-title { margin-bottom: 0; }
    .section-link { font-size: 12px; color: #e95f5f; text-decoration: none; font-weight: 700; }

    /* Self-esteem graph */
    .score-legend {
      display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .score-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #888; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* Recent report */
    .report-item {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f5e5e5;
    }
    .report-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .report-dot { color: #e95f5f; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
    .report-text { font-size: 13px; color: #555; line-height: 1.6; }

    /* Progress bar mini */
    .progress-mini { margin-top: 14px; }
    .progress-mini-label { display: flex; justify-content: space-between; font-size: 11px; color: #bbb; margin-bottom: 6px; }
    .progress-mini-label strong { color: #e95f5f; }
    .progress-bar-bg { height: 6px; background: #f5e5e5; border-radius: 3px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #e95f5f, #f5a0a0); border-radius: 3px; transition: width .6s; }

    /* Chapter roadmap */
    .roadmap { display: flex; align-items: center; gap: 0; overflow-x: auto; padding: 4px 0 8px; }
    .roadmap::-webkit-scrollbar { display: none; }
    .roadmap-chapter {
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0; min-width: 60px;
    }
    .roadmap-dot {
      width: 34px; height: 34px; border-radius: 50%; border: 2.5px solid #f5e5e5;
      background: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #ccc; position: relative; z-index: 1;
      transition: all .3s;
    }
    .roadmap-dot.done { background: #e95f5f; border-color: #e95f5f; color: #fff; }
    .roadmap-dot.current { background: #fff3f3; border-color: #e95f5f; color: #e95f5f; box-shadow: 0 0 0 4px rgba(233,95,95,0.15); }
    .roadmap-label { font-size: 9px; color: #bbb; margin-top: 5px; text-align: center; line-height: 1.3; }
    .roadmap-label.done { color: #e95f5f; font-weight: 700; }
    .roadmap-line { flex: 1; height: 2px; background: #f5e5e5; min-width: 8px; }
    .roadmap-line.done { background: #e95f5f; }

    /* Notice card */
    .notice-card {
      background: linear-gradient(135deg, #fff8f8, #fff0f3);
      border: 1.5px solid #f5c0c0; border-radius: 18px;
      padding: 16px 18px; margin-bottom: 14px;
      display: flex; gap: 12px; align-items: flex-start;
    }
    .notice-icon { font-size: 26px; flex-shrink: 0; }
    .notice-label { font-size: 10px; font-weight: 700; color: #e95f5f; margin-bottom: 4px; letter-spacing: .5px; }
    .notice-title { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 4px; }
    .notice-body { font-size: 13px; color: #666; line-height: 1.8; white-space: pre-line; }

    /* Day 1-7 guide */
    .week-guide {
      background: linear-gradient(135deg, #fff8e1, #fff3cd);
      border: 2px solid #f59f00; border-radius: 18px;
      padding: 16px 18px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit;
    }
    .week-guide-icon { font-size: 30px; flex-shrink: 0; }
    .week-guide-inner { flex: 1; min-width: 0; }
    .week-guide-label { font-size: 10px; font-weight: 700; color: #f59f00; letter-spacing: .5px; margin-bottom: 3px; }
    .week-guide-text { font-size: 14px; font-weight: 700; color: #333; }
    .week-guide-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">Re Relation</div>
    <div class="header-right">
      <span id="admin-link" style="display:none">
        <button class="admin-btn" onclick="window.location.href='admin.html'">管理</button>
      </span>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </div>

  <div class="content">
    <!-- ジローからのお知らせ -->
    <div class="notice-card" id="notice-card" style="display:none">
      <div style="flex:1">
        <div class="notice-label">ジローより</div>
        <div class="notice-title" id="notice-title"></div>

    <!-- Welcome -->
    <div class="welcome-card">

      <div class="welcome-name" id="welcome-name">読み込み中...</div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="streak-val">0</div>
        <div class="stat-unit">日</div>
        <div class="stat-label">連続<br>チェックイン</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-val">0</div>

      </div>
      <div class="stat-card">

    <!-- 入会1週間ガイド -->
    <a class="week-guide" id="week-guide" href="lectures.html">
      <div class="week-guide-inner">
        <div class="week-guide-label">講義・ワーク</div>
        <div class="week-guide-text" id="guide-text">今日の講義・ワークを進めよう</div>
        <div class="week-guide-sub">タップして開く →</div>
      </div>
    </a>


    <!-- 幸せ日記 -->
    <a class="week-guide" href="daily_report.html" id="diary-cta-main">
      <div class="week-guide-inner">
        <div class="week-guide-label" id="diary-main-label">幸せ日記</div>
        <div class="week-guide-text">今日の幸せ日記を書く</div>
        <div class="week-guide-sub" id="diary-main-sub">3つの良かったことを記録しよう</div>
      </div>
    </a>

    <!-- 日記・月次レポート -->
    <div class="cta-grid">
      <a class="cta-card" href="diary.html">
        <div class="cta-title">復縁日記</div>
        <div class="cta-sub">今の気持ちを自由に</div>
      </a>
      <a class="cta-card" href="monthly_report.html">
        <div class="cta-title">月次レポート</div>
        <div class="cta-sub">今月の成長を確認</div>
      </a>
    </div>

    <!-- 章ロードマップ -->
    <div class="section">
      <div class="section-title">学習の進み具合</div>
      <div class="roadmap" id="roadmap"></div>
      <div class="progress-mini">
        <div class="progress-mini-label">
          <span>解放済み講義</span>
          <span><strong id="progress-num">0</strong> / 42</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- 自己肯定感スコアの変化 -->
    <div class="section" id="esteem-section" style="display:none">
      <div class="section-title-row">
        <div class="section-title">自己肯定感スコアの変化</div>
        <div style="font-size:11px;color:#bbb">週1回</div>
      </div>
      <div class="score-legend">
        <div class="score-legend-item">
          <div class="legend-dot" style="background:#e95f5f"></div>自己肯定感
        </div>
        <div class="score-legend-item">
          <div class="legend-dot" style="background:#7ab8f5"></div>ポジティブ度
        </div>
      </div>
      <canvas id="esteemChart" height="120"></canvas>
    </div>

    <!-- 過去7日間のチェックインスコア -->
    <div class="section">
      <div class="section-title">過去7日間のスコア推移</div>
      <canvas id="scoreChart" height="110"></canvas>
    </div>

    <!-- 最近の日報 -->
    <div class="section" id="report-section" style="display:none">
      <div class="section-title-row">
        <div class="section-title">最近の日報</div>
        <a class="section-link" href="daily_report.html">書く →</a>
      </div>
      <div id="recent-report"></div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="lectures-data.js"></script>
  <script>
    const { createClient } = window.supabase;
    const sb = createClient(
      'https://ejcajjtptbrcwmgzqhjz.supabase.co',
      'sb_publishable_LF8EU4bFZpegd6wZPXGynQ_j_nkEGdP'
    );

    const ADMIN_EMAIL = 'shoyaaaaaa1127@gmail.com';
    const LINE_ID = 'YOUR_LINE_ID'; // ← ジローの公式LINE IDに変更 (@から始まる)

    const GOAL_LABELS = {
      reconnect: '💕 元彼と復縁したい',
      next_love: '🌱 次の恋愛で成功したい',
      closure: '🕊️ 納得できる終わらせ方'
    };
    const MESSAGES = [
      'ここに来てくれてありがとう。今日も一緒に進んでいこうね。',
      '今日もあなたのことを応援しています💕',
      'ここに来てくれただけで、もう一歩前進してるよ。',
      '自分を大切にすることが、一番の近道だよ。',
      '毎日ここに来てくれていること、ちゃんと見てるよ。',
      '焦らなくていい。あなたのペースで大丈夫。',
      '少しずつ、確実に前に進んでいるよ。'
    ];
    const CHAPTER_RANGES = [
      { chapter: '第0章', label: '0章', start: 0, end: 1 },
      { chapter: '第1章', label: '1章', start: 2, end: 3 },
      { chapter: '第2章', label: '2章', start: 4, end: 5 },
      { chapter: '第3章', label: '3章', start: 6, end: 14 },
      { chapter: '第4章', label: '4章', start: 15, end: 32 },
      { chapter: '第5章', label: '5章', start: 33, end: 41 }
    ];

    function getDateStr(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    async function logout() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }

    function getEnrollDays(profile) {
      const enrollDate = profile?.enrollment_date
        ? new Date(profile.enrollment_date + 'T00:00:00')
        : new Date(profile?.created_at || new Date());
      enrollDate.setHours(0, 0, 0, 0);
      const today = new Date(); today.setHours(0, 0, 0, 0);
      return Math.floor((today - enrollDate) / 86400000) + 1;
    }

    (async () => {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { window.location.href = 'index.html'; return; }

      if (user.email === ADMIN_EMAIL) {
        document.getElementById('admin-link').style.display = 'inline';
      }

      const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
      if (!profile || !profile.name) { window.location.href = 'onboarding.html'; return; }

      // 日付・名前・メッセージ
      const name = profile.name || 'さん';
      const today = new Date();
      const days = ['日','月','火','水','木','金','土'];
      document.getElementById('date-text').textContent =
        `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日（${days[today.getDay()]}）`;
      document.getElementById('welcome-name').textContent = `${name}さん、こんにちは`;
      document.getElementById('welcome-msg').textContent = MESSAGES[today.getDate() % MESSAGES.length];

      // 入会日数バッジ
      const enrollDays = getEnrollDays(profile);
      document.getElementById('days-badge').textContent = `入会 ${enrollDays} 日目`;

      // 並行フェッチ
      const todayStr = getDateStr(today);
      const [checkinsRes, todayReportRes, latestReportRes, viewsRes, worksRes, esteemRes] = await Promise.all([
        sb.from('checkins').select('*').eq('user_id', user.id).order('date', { ascending: false }),
        sb.from('daily_reports').select('id').eq('user_id', user.id).eq('date', todayStr).single(),
        sb.from('daily_reports').select('date,good1,good2,good3').eq('user_id', user.id).order('date', { ascending: false }).limit(1).single(),
        sb.from('lecture_views').select('lecture_id').eq('user_id', user.id),
        sb.from('work_answers').select('lecture_id').eq('user_id', user.id),
        sb.from('daily_reports').select('date,self_esteem_score,positive_score')
          .eq('user_id', user.id).not('self_esteem_score', 'is', null)
          .order('date', { ascending: true }).limit(12)
      ]);

      const checkins = checkinsRes.data || [];
      const viewedSet = new Set((viewsRes.data || []).map(v => v.lecture_id));
      const workSet = new Set((worksRes.data || []).map(w => w.lecture_id));
      const esteemData = esteemRes.data || [];

      // 統計
      document.getElementById('total-val').textContent = checkins.length;

      const todayCheckin = checkins.find(c => c.date === todayStr);
      if (todayReportRes.data) {
        document.getElementById('diary-main-label').textContent = '幸せ日記 ✓';
        document.getElementById('diary-main-sub').textContent = '今日は記録済みです';
      }

      // ストリーク
      let streak = 0;
      if (checkins.length > 0) {
        const checkDate = new Date(today);
        if (!todayCheckin) checkDate.setDate(checkDate.getDate() - 1);
        for (const c of [...checkins].sort((a, b) => b.date.localeCompare(a.date))) {
          if (c.date === getDateStr(checkDate)) { streak++; checkDate.setDate(checkDate.getDate() - 1); }
          else break;
        }
      }
      document.getElementById('streak-val').textContent = streak;

      // 週平均
      const weekAgo = new Date(today);
      weekAgo.setDate(weekAgo.getDate() - 6);
      const weekCheckins = checkins.filter(c => c.date >= getDateStr(weekAgo));
      if (weekCheckins.length > 0) {
        const avg = weekCheckins.reduce((s, c) => s + (c.mood + c.action + c.state) / 3, 0) / weekCheckins.length;
        document.getElementById('avg-val').textContent = avg.toFixed(1);
      }

      // 解放数
      const totalLectures = (typeof LECTURES !== 'undefined') ? LECTURES.length : 43;
      const totalWorks = (typeof LECTURES !== 'undefined') ? LECTURES.filter(l => l.type === 'work').length : 16;
      const unlockedCount = Math.min(enrollDays, totalLectures);
      document.getElementById('progress-num').textContent = unlockedCount;
      document.getElementById('progress-bar').style.width = (unlockedCount / totalLectures * 100) + '%';
      document.getElementById('lecture-sub').textContent = `${unlockedCount}本解放中`;
      document.getElementById('work-sub').textContent = `${workSet.size}件提出済み`;

      // ジローからのお知らせ（最新1件）
      const { data: notices } = await sb.from('notices').select('*').order('is_pinned', { ascending: false }).order('created_at', { ascending: false }).limit(1).single();
      if (notices) {
        document.getElementById('notice-card').style.display = 'flex';
        document.getElementById('notice-title').textContent = notices.title;
        document.getElementById('notice-body').textContent = notices.body;
      }

      // 入会1週間ガイド (Day 1〜7)
      // 入会1週間のみ案内テキストを変える
      const DAY_GUIDE_TEXTS = [
        'まず第0章の講義を見てみよう',
        '第1章の講義を進めてみよう',
        '第1章を進めよう',
        '第2章に挑戦しよう',
        '第2・3章を進めよう',
        '最初のワーク（3-3）に挑戦しよう',
        '1週間続けられたね。この調子で進もう'
      ];
      if (enrollDays >= 1 && enrollDays <= 7) {
        document.getElementById('guide-text').textContent = DAY_GUIDE_TEXTS[enrollDays - 1];
      }



      // 章ロードマップ
      const roadmapEl = document.getElementById('roadmap');
      let roadmapHtml = '';
      CHAPTER_RANGES.forEach((ch, i) => {
        const total = ch.end - ch.start + 1;
        let completed = 0;
        for (let j = ch.start; j <= ch.end && j < unlockedCount; j++) {
          // 簡易：index ベース（実際はlecture typeによるが概算）
          completed++;
        }
        const allDone = completed >= total && unlockedCount > ch.end;
        const isCurrent = unlockedCount > ch.start && !allDone;
        const dotClass = allDone ? 'done' : isCurrent ? 'current' : '';
        const labelClass = allDone ? 'done' : '';
        const lineClass = allDone ? 'done' : '';
        if (i > 0) roadmapHtml += `<div class="roadmap-line ${lineClass}"></div>`;
        roadmapHtml += `<div class="roadmap-chapter">
          <div class="roadmap-dot ${dotClass}">${allDone ? '✓' : ch.label}</div>
          <div class="roadmap-label ${labelClass}">${ch.chapter}</div>
        </div>`;
      });
      roadmapEl.innerHTML = roadmapHtml;

      // チェックインスコアグラフ（7日間）
      const chartLabels = [], scoreData = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today); d.setDate(d.getDate() - i);
        chartLabels.push(`${d.getMonth()+1}/${d.getDate()}`);
        const c = checkins.find(x => x.date === getDateStr(d));
        scoreData.push(c ? +((c.mood + c.action + c.state) / 3).toFixed(1) : null);
      }
      new Chart(document.getElementById('scoreChart').getContext('2d'), {
        type: 'line',
        data: {
          labels: chartLabels,
          datasets: [{
            data: scoreData,
            borderColor: '#e95f5f', backgroundColor: 'rgba(233,95,95,0.08)',
            fill: true, tension: .4, pointRadius: 5,
            pointBackgroundColor: '#e95f5f', pointBorderColor: '#fff', pointBorderWidth: 2,
            spanGaps: true
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: { min: 1, max: 5, ticks: { stepSize: 1, color: '#ccc', font: { size: 11, family: "'Zen Maru Gothic'" } }, grid: { color: '#f5e5e5' } },
            x: { ticks: { color: '#ccc', font: { size: 11, family: "'Zen Maru Gothic'" } }, grid: { display: false } }
          },
          plugins: { legend: { display: false } }
        }
      });

      // 自己肯定感スコアグラフ（週次）
      if (esteemData.length >= 2) {
        document.getElementById('esteem-section').style.display = 'block';
        const eLabels = esteemData.map(r => r.date.slice(5).replace('-', '/'));
        const eScores = esteemData.map(r => r.self_esteem_score);
        const pScores = esteemData.map(r => r.positive_score);
        new Chart(document.getElementById('esteemChart').getContext('2d'), {
          type: 'line',
          data: {
            labels: eLabels,
            datasets: [
              {
                label: '自己肯定感', data: eScores,
                borderColor: '#e95f5f', backgroundColor: 'rgba(233,95,95,0.07)',
                fill: true, tension: .4, pointRadius: 4,
                pointBackgroundColor: '#e95f5f', pointBorderColor: '#fff', pointBorderWidth: 2,
                spanGaps: true
              },
              {
                label: 'ポジティブ度', data: pScores,
                borderColor: '#7ab8f5', backgroundColor: 'rgba(122,184,245,0.07)',
                fill: true, tension: .4, pointRadius: 4,
                pointBackgroundColor: '#7ab8f5', pointBorderColor: '#fff', pointBorderWidth: 2,
                spanGaps: true
              }
            ]
          },
          options: {
            responsive: true,
            scales: {
              y: { min: 1, max: 10, ticks: { stepSize: 2, color: '#ccc', font: { size: 11, family: "'Zen Maru Gothic'" } }, grid: { color: '#f5e5e5' } },
              x: { ticks: { color: '#ccc', font: { size: 11, family: "'Zen Maru Gothic'" } }, grid: { display: false } }
            },
            plugins: { legend: { display: false } }
          }
        });
      }

      // 最近の日報
      if (latestReportRes.data) {
        const r = latestReportRes.data;
        document.getElementById('report-section').style.display = 'block';
        const goods = [r.good1, r.good2, r.good3].filter(Boolean);
        document.getElementById('recent-report').innerHTML = `
          <div style="font-size:11px;color:#ccc;margin-bottom:12px">${r.date}</div>
          ${goods.map(g => `<div class="report-item"><div class="report-dot">🌸</div><div class="report-text">${g}</div></div>`).join('')}
        `;
      }
    })();
  </script>
</body>
</html>
