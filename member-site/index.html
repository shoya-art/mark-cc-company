<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リリー | ログイン</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('brand-hero.png') center/cover no-repeat;
      filter: brightness(1.2);
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.22);
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-title {
      font-size: 38px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 4px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .logo-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      margin-top: 8px;
      letter-spacing: 1px;
      line-height: 1.6;
    }
    .card {
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.40);
      border-radius: 22px;
      padding: 36px 28px 32px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      text-align: center;
      margin-bottom: 24px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      margin-bottom: 7px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 15px 18px;
      background: #fff;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 12px;
      color: #333;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      -webkit-appearance: none;
    }
    input::placeholder { color: #ccc; }
    input:focus {
      border-color: #e95f5f;
      box-shadow: 0 0 0 3px rgba(233,95,95,0.12);
    }
    .btn {
      width: 100%;
      padding: 17px;
      background: #e95f5f;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .1s;
      letter-spacing: 1px;
    }
    .btn:hover { opacity: .88; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .error-msg {
      background: rgba(255,100,100,0.2);
      border: 1px solid rgba(255,100,100,0.4);
      color: #ffb3b3;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
    }
    .hint {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 20px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-title">Lily</div>
      <div class="logo-sub">〜彼とあなたの気持ちを結び直す〜</div>
    </div>

    <div class="card">
      <div class="card-title">ログイン</div>

      <div id="error-msg" class="error-msg"></div>

      <div class="field">
        <label>ログインID</label>
        <input type="text" id="member-id" placeholder="例：001" inputmode="numeric">
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="password" placeholder="ジローから送られたパスワード">
      </div>

      <button class="btn" id="submit-btn" onclick="handleLogin()">ログインする</button>
    </div>

    <p class="hint">IDとパスワードはジローよりLINEでお送りしています<br>ご不明な場合はLINEでお問い合わせください</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const { createClient } = window.supabase;
    const sb = createClient(
      'https://ejcajjtptbrcwmgzqhjz.supabase.co',
      'sb_publishable_LF8EU4bFZpegd6wZPXGynQ_j_nkEGdP'
    );

    const EMAIL_DOMAIN = '@lily-member.app';
    const ADMIN_LOGIN_ID = 'jiro';
    const ADMIN_EMAIL = 'shoyaaaaaa1127@gmail.com';

    function buildEmail(memberId) {
      if (memberId.trim().toLowerCase() === ADMIN_LOGIN_ID) return ADMIN_EMAIL;
      const padded = memberId.trim().padStart(3, '0');
      return padded + EMAIL_DOMAIN;
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function handleLogin() {
      const memberId = document.getElementById('member-id').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submit-btn');

      if (!memberId || !password) {
        showError('IDとパスワードを入力してください');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'ログイン中...';
      document.getElementById('error-msg').style.display = 'none';

      const email = buildEmail(memberId);
      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        showError('IDまたはパスワードが正しくありません');
        btn.disabled = false;
        btn.textContent = 'ログインする';
        return;
      }

      // プロフィール確認・なければ作成
      const { data: profile } = await sb.from('profiles')
        .select('goal, enrollment_date')
        .eq('id', data.user.id)
        .single();

      if (!profile) {
        // 初回ログイン：プロフィール作成
        await sb.from('profiles').insert({
          id: data.user.id,
          email: email,
          enrollment_date: (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })()
        });
        window.location.href = 'onboarding.html';
      } else if (!profile.goal) {
        window.location.href = 'onboarding.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    }

    // Enterキー送信
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    // 既にログイン済みならダッシュボードへ
    (async () => {
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        const { data: profile } = await sb.from('profiles').select('goal').eq('id', user.id).single();
        window.location.href = (!profile || !profile.goal) ? 'onboarding.html' : 'dashboard.html';
      }
    })();
  </script>
</body>
</html>
